name: Kéo dữ liệu Ecom & shopee

on:
  schedule:
    - cron: "*/10 * * * *"   # chạy mỗi 10 phút
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Clone repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-cloud-bigquery google-auth pyarrow

      # 4️⃣ Run Creator TikTok ETL
      - name: Run Creator TikTok ETL
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python keo_creator_bigquery.py

      # 5️⃣ Run Doitac TikTok ETL
      - name: Run Doitac TikTok ETL
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python keo_doitaclk_bigquery.py

      # 6️⃣ Run Salework TikTok ETL
      - name: Run Salework TikTok ETL
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python dtsaleworkbigquerytiktok.py

      # 7️⃣ Run Salework Shopee ETL
      - name: Run Salework Shopee ETL
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python dtsaleworkbigqueryshopee.py
