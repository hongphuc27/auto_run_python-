name: Auto Run Python

on:
  schedule:
    - cron: "35 15 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google credential file
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google_key.json
      
      - name: Set Google Credentials
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=google_key.json" >> $GITHUB_ENV
      
      - name: Run Python
        run: python facebook_performance_bg_automate.py
