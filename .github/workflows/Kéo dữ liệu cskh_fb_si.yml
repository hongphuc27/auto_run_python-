name: Kéo dữ liệu cskh_fb_si

on:
  schedule:
    - cron: "*/40 * * * *"   # chạy mỗi 40 phút

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google credential file
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google_key.json
      
      - name: Set Google Credentials
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=google_key.json" >> $GITHUB_ENV
      
      - name: Run Python
        run: |
  python report_linh.py
  python report_linhOA.py
          
