name: Kéo dữ liệu TikTok Pay Settlement (RHYSMAN + HAIR)

on:
  schedule:
    # 01:00 UTC = 08:00 giờ VN. GitHub cron LUÔN chạy theo UTC.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      last_days:
        description: "Số ngày gần nhất theo settlement_time"
        required: false
        default: "2"
      month:
        description: "Backfill cả tháng (YYYY-MM). Điền cái này sẽ BỎ QUA last_days"
        required: false
        default: ""

concurrency:
  group: tiktok-pay-settlement
  cancel-in-progress: false

jobs:

  # ==================== JOB 1: SHOP RHYSMAN ====================
  rhysman:
    name: Settlement RHYSMAN
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl google-cloud-bigquery google-auth

      - name: Run export_pay_settlement_rhysman.py
        env:
          COOKIE_ENV_NAME: TIKTOK_COOKIE_RHYSMAN
          TIKTOK_COOKIE_RHYSMAN: ${{ secrets.TIKTOK_COOKIE_RHYSMAN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BQ_DATASET: rhysman
          BQ_TABLE: fact_tiktok_pay_settlement
          PYTHONIOENCODING: utf-8
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python -u export_pay_settlement_rhysman.py \
              --month "${{ github.event.inputs.month }}" --wait 300
          else
            python -u export_pay_settlement_rhysman.py \
              --last-days "${{ github.event.inputs.last_days || '2' }}" --wait 300
          fi

  # ==================== JOB 2: SHOP HAIR ====================
  # needs: rhysman -> chờ RHYSMAN xong mới chạy. Tránh lỗi TikTok 22008001
  #                   ("đang chuẩn bị tệp") do 2 export job chồng nhau.
  # if: always()   -> RHYSMAN fail thì HAIR VẪN chạy.
  hair:
    name: Settlement HAIR
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: rhysman
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl google-cloud-bigquery google-auth

      - name: Run export_pay_settlement_hair.py
        env:
          COOKIE_ENV_NAME: TIKTOK_COOKIE_HAIR
          TIKTOK_COOKIE_HAIR: ${{ secrets.TIKTOK_COOKIE_HAIR }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BQ_DATASET: rhysman
          BQ_TABLE: fact_tiktok_pay_settlement
          PYTHONIOENCODING: utf-8
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python -u export_pay_settlement_hair.py \
              --month "${{ github.event.inputs.month }}" --wait 300
          else
            python -u export_pay_settlement_hair.py \
              --last-days "${{ github.event.inputs.last_days || '2' }}" --wait 300
          fi
