name: Kéo dữ liệu video a huy

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      TIKTOK_COOKIE_RHYSMAN: ${{ secrets.TIKTOK_COOKIE_RHYSMAN }}
    steps:
      # 1️⃣ Clone repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-cloud-bigquery google-auth pyarrow

      # 4️⃣ Run Aff video
      - name: Run Aff video
        run: python phantichvideoAHUY.py

