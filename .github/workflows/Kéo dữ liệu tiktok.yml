name: Kéo dữ liệu tiktok

on:
  schedule:
    - cron: "*/59 * * * *"
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-cloud-bigquery google-auth pyarrow playwright
          playwright install --with-deps chromium

      - name: Run Salework TikTok ETL
        env:
          SALEWORK_EMAIL: ${{ secrets.SALEWORK_EMAIL }}
          SALEWORK_PASSWORD: ${{ secrets.SALEWORK_PASSWORD }}
          SALEWORK_COMPANYCODE: ${{ secrets.SALEWORK_COMPANYCODE }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python dtsaleworkbigquerytiktok.py
        
      - name: Run Cost TikTok
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python keocptiktok.py
