name: Salework Shopee TEST

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  run-etl:
    runs-on: ubuntu-latest

    env:
      SALEWORK_EMAIL: ${{ secrets.SALEWORK_EMAIL }}
      SALEWORK_PASSWORD: ${{ secrets.SALEWORK_PASSWORD }}
      SALEWORK_COMPANYCODE: ${{ secrets.SALEWORK_COMPANYCODE }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run script
        run: python shopeesalework.py
