name: Sync Lark Booking

on:
  workflow_dispatch:

  schedule:
    # GitHub cron dùng UTC.
    # Tương ứng 08:00, 11:00, 14:00, 17:00, 21:00 giờ Việt Nam.
    - cron: "0 9,12,15,17,21 * * *"

permissions:
  contents: read

jobs:
  booking-video:
    name: Booking Video to Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    concurrency:
      group: lark-booking-video
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate Google service account
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_BOOKING }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python libraries
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "requests>=2.32,<3" \
            "pandas>=2.2,<3" \
            "gspread>=6.1,<7" \
            "google-auth>=2.35,<3"

      - name: Sync Booking Video
        env:
          PYTHONUTF8: "1"
          LARK_APP_ID: ${{ secrets.LARK_APP_ID_BASE }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET_BASE }}
          LARK_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_TABLE_ID: ${{ secrets.LARK_BASE_TABLE_ID_VIDEO }}
        run: python sync_booking_video.py

  booking-live:
    name: Booking Live to Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    concurrency:
      group: lark-booking-live
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate Google service account
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_BOOKING }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python libraries
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "requests>=2.32,<3" \
            "pandas>=2.2,<3" \
            "gspread>=6.1,<7" \
            "google-auth>=2.35,<3"

      - name: Sync Booking Live
        env:
          PYTHONUTF8: "1"
          LARK_APP_ID: ${{ secrets.LARK_APP_ID_BASE }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET_BASE }}
          LARK_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_TABLE_ID: ${{ secrets.LARK_BASE_TABLE_ID_LIVE }}
        run: python sync_booking_live.py
