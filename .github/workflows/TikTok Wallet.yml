name: TikTok Wallet - 2 Shops

on:
  workflow_dispatch:
    inputs:
      last_days:
        description: "Số ngày gần nhất cần đồng bộ"
        required: false
        default: "3"

  schedule:
    # GitHub dùng UTC.
    # Tương ứng 08:00, 11:00, 14:00, 17:00, 21:00 giờ Việt Nam.
    - cron: "0 1,4,7,10,14 * * *"

permissions:
  contents: read

jobs:
  wallet-rhysman:
    name: Wallet RHYSMAN
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: tiktok-wallet-rhysman
      cancel-in-progress: false

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python libraries
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "openpyxl>=3.1.5,<4" \
            "google-cloud-bigquery>=3.25.0,<4" \
            "google-auth>=2.35.0,<3"

      - name: Export RHYSMAN wallet
        env:
          PYTHONUTF8: "1"
          SHOP_NAME: RHYSMAN
          TIKTOK_COOKIE: ${{ secrets.TIKTOK_COOKIE_RHYSMAN }}

          GCP_PROJECT_ID: rhysman-data-warehouse-488306
          BQ_DATASET: rhysman
          BQ_TABLE: fact_tiktok_pay_wallet

          LAST_DAYS: ${{ github.event.inputs.last_days || '3' }}

        run: |
          python export_pay_wallet.py \
            --last-days "$LAST_DAYS" \
            --shop-name "$SHOP_NAME"

  wallet-hair:
    name: Wallet HAIR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: tiktok-wallet-hair
      cancel-in-progress: false

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python libraries
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "openpyxl>=3.1.5,<4" \
            "google-cloud-bigquery>=3.25.0,<4" \
            "google-auth>=2.35.0,<3"

      - name: Export HAIR wallet
        env:
          PYTHONUTF8: "1"
          SHOP_NAME: HAIR
          TIKTOK_COOKIE: ${{ secrets.TIKTOK_COOKIE_HAIR }}

          GCP_PROJECT_ID: rhysman-data-warehouse-488306
          BQ_DATASET: rhysman
          BQ_TABLE: fact_tiktok_pay_wallet

          LAST_DAYS: ${{ github.event.inputs.last_days || '3' }}

        run: |
          python export_pay_wallet.py \
            --last-days "$LAST_DAYS" \
            --shop-name "$SHOP_NAME"
