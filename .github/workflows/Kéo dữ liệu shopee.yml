name: Kéo dữ liệu Shopee

on:
  schedule:
    - cron: "*/10 * * * *"   # chạy mỗi 10 phút
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Clone repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-cloud-bigquery google-auth pyarrow

      # 7️⃣ Run Salework Shopee ETL
      - name: Run Salework Shopee ETL
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python dtsaleworkbigqueryshopee.py

      # 7️⃣ Run Cost Salework Shopee ETL
      - name: Run Cost Salework Shopee ETL
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python ads_shopee.py
