name: Kéo dữ liệu Shopee

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Clone repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-cloud-bigquery google-auth pyarrow playwright
          playwright install --with-deps chromium

      # 7️⃣ Run Salework Shopee ETL
      - name: Run Salework Shopee ETL
        env:
          SALEWORK_EMAIL: ${{ secrets.SALEWORK_EMAIL }}
          SALEWORK_PASSWORD: ${{ secrets.SALEWORK_PASSWORD }}
          SALEWORK_COMPANYCODE: ${{ secrets.SALEWORK_COMPANYCODE }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python shopeesalework.py

      - name: Run Cost Salework Shopee ETL
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SALEWORK_EMAIL: ${{ secrets.SALEWORK_EMAIL }}
          SALEWORK_PASSWORD: ${{ secrets.SALEWORK_PASSWORD }}
          SALEWORK_COMPANYCODE: ${{ secrets.SALEWORK_COMPANYCODE }}
        run: python ads_shopee.py
