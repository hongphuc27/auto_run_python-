name: Kéo dữ liệu TikTok Pay Settlement HAIR

on:
  schedule:
    # 01:00 UTC = 08:00 giờ VN. GitHub cron LUÔN chạy theo UTC.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      last_days:
        description: "Số ngày gần nhất theo settlement_time"
        required: false
        default: "2"
      month:
        description: "Backfill cả tháng (YYYY-MM). Điền cái này sẽ BỎ QUA last_days"
        required: false
        default: ""

concurrency:
  # Script DELETE rồi INSERT theo khoảng ngày -> 2 job chạy song song sẽ đá nhau.
  group: tiktok-pay-settlement
  cancel-in-progress: false

jobs:
  run-settlement:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl google-cloud-bigquery google-auth

      - name: Run TikTok Pay Settlement ETL
        env:
          TIKTOK_COOKIE_RHYSMAN: ${{ secrets.TIKTOK_COOKIE_RHYSMAN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BQ_DATASET: rhysman
          BQ_TABLE: fact_tiktok_pay_settlement
          PYTHONIOENCODING: utf-8
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python -u export_pay_settlement_hair.py \
              --month "${{ github.event.inputs.month }}" --wait 300
          else
            python -u export_pay_settlement_rhysman.py \
              --last-days "${{ github.event.inputs.last_days || '2' }}" --wait 300
          fi
