name: Kéo dữ liệu Shopee test

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-cloud-bigquery google-auth pyarrow playwright
          playwright install --with-deps chromium

      - name: Run Cost Salework Shopee ETL
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SALEWORK_AUTHORIZATION: ${{ secrets.SALEWORK_AUTHORIZATION }}
          SALEWORK_COMPANYCODE: ${{ secrets.SALEWORK_COMPANYCODE }}
          SALEWORK_COOKIE: ${{ secrets.SALEWORK_COOKIE }}
        run: python ads_shopee.py
